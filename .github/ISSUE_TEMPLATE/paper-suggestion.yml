name: Suggest a paper
description: Suggest a paper for a future reading week.
title: "[Paper Suggestion]:"
labels: ["paper-suggestion"]
body:
  - type: input
    id: paper_id
    attributes:
      label: Paper ID
      description: "Use lowercase letters, numbers, and hyphens. Example: shepard-1987-generalization"
      placeholder: "author-2026-short-title"
    validations:
      required: true

  - type: input
    id: paper_title
    attributes:
      label: Paper title
      placeholder: "Toward a Universal Law of Generalization for Psychological Science"
    validations:
      required: true

  - type: input
    id: authors
    attributes:
      label: Authors
      placeholder: "Author et al."
    validations:
      required: true

  - type: input
    id: year
    attributes:
      label: Year
      placeholder: "1987"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL or DOI
      placeholder: "https://doi.org/10.1126/science.3629243"
    validations:
      required: false

  - type: input
    id: suggested_week
    attributes:
      label: Suggested week
      placeholder: "2026-W21"
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      placeholder: "memory, hippocampus, modeling"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why should the lab read this?
      description: A short reason, summary, or note for the lab.
    validations:
      required: false
