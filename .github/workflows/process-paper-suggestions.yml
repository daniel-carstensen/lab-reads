name: Process paper suggestions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pages: write
  id-token: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - name: Fetch closed paper suggestions
        run: gh issue list --label paper-suggestion --state closed --limit 100 --json number,title,body > /tmp/paper-suggestions.json
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Process paper suggestions
        run: node scripts/process-paper-suggestions.mjs /tmp/paper-suggestions.json
      - run: npm run validate:data
      - name: Commit updated papers
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add hourly paper suggestions"
          file_pattern: public/data/papers.json
      - run: npm run build
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
      - uses: actions/upload-pages-artifact@v5
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
        with:
          path: ./dist
      - uses: actions/deploy-pages@v4
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
