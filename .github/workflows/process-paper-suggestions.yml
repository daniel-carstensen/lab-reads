name: Process paper suggestions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issues:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  process:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && (contains(github.event.issue.labels.*.name, 'paper-suggestion') || startsWith(github.event.issue.title, '[Paper Suggestion]')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - name: Fetch closed paper suggestions
        run: gh issue list --state closed --limit 100 --json number,title,body,labels > /tmp/paper-suggestions.json
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Process paper suggestions
        run: node scripts/process-paper-suggestions.mjs /tmp/paper-suggestions.json
      - run: npm run validate:data
      - name: Commit updated papers
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add paper suggestions from closed issues"
          file_pattern: public/data/papers.json
