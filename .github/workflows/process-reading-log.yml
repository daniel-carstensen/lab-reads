name: Process reading log issue

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issues:
    types: [closed]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'reading-log')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - name: Process reading log issue
        run: node scripts/process-reading-issue.mjs
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
      - run: npm run validate:data
      - name: Commit updated reading logs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add reading log from issue #${{ github.event.issue.number }}"
          file_pattern: public/data/reading_logs.json
