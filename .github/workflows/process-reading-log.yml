name: Process reading log issue

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issues:
    types: [closed]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'reading-log') || startsWith(github.event.issue.title, '[Reading Log]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - name: Process reading log issue
        run: node scripts/process-reading-issue.mjs
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
      - run: npm run validate:data
      - name: Commit updated reading logs
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add reading log from issue #${{ github.event.issue.number }}"
          file_pattern: public/data/reading_logs.json
      - run: npm run build
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
      - uses: actions/upload-pages-artifact@v5
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
        with:
          path: ./dist
      - uses: actions/deploy-pages@v4
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
